<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수행평가 폭탄주의보</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .status-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 200px;
        }

        .status-number {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .status-label {
            color: #666;
            font-size: 0.9em;
        }

        .status-message {
            margin-top: 15px;
            padding: 10px;
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            color: #333;
            font-size: 0.9em;
        }

        .status-danger .status-number { color: #ff6b6b; }
        .status-danger .status-message { 
            background: #ffe0e0;
            border-left-color: #ff6b6b;
        }

        .status-warning .status-number { color: #ffa500; }
        .status-warning .status-message { 
            background: #fff3e0;
            border-left-color: #ffa500;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 12px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1em;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #e0e7ff;
            color: #667eea;
        }

        .btn-secondary:hover {
            background: #c7d2fd;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .list-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .list-item h3 {
            color: #333;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .list-item-info div {
            display: flex;
            justify-content: space-between;
        }

        .priority-score {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            padding: 5px 10px;
            background: #f0f4ff;
            border-radius: 4px;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .alert-success {
            background: #e6f9ed;
            color: #1b7a3f;
            border: 1px solid #7fd4b5;
        }

        .alert-error {
            background: #ffe6e6;
            color: #c41e1e;
            border: 1px solid #ff6b6b;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            margin: 0;
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .list-item-info {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 수행평가 폭탄주의보</h1>
            <p>마감이 몰린 수행평가를 확인하고 우선순위를 정리하세요</p>
        </header>

        <!-- 대시보드 요약 -->
        <div class="dashboard-grid">
            <div class="card status-card" id="dashboardCard">
                <div class="loading">로딩 중...</div>
            </div>
        </div>

        <!-- 탭 메뉴 -->
        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('assessments')">수행평가 목록</button>
            <button class="tab-button" onclick="switchTab('priority')">우선순위</button>
            <button class="tab-button" onclick="switchTab('report')">분석 리포트</button>
            <button class="tab-button" onclick="switchTab('add')">데이터 추가</button>
        </div>

        <!-- 수행평가 목록 탭 -->
        <div id="assessments" class="tab-content card active">
            <h2>📝 수행평가 목록</h2>
            <div id="assessmentList" class="loading">로딩 중...</div>
        </div>

        <!-- 우선순위 탭 -->
        <div id="priority" class="tab-content card">
            <h2>⭐ 우선순위</h2>
            <div id="priorityList" class="loading">로딩 중...</div>
        </div>

        <!-- 리포트 탭 -->
        <div id="report" class="tab-content card">
            <h2>📊 분석 리포트</h2>
            <div id="reportContent" class="loading">로딩 중...</div>
        </div>

        <!-- 데이터 추가 탭 -->
        <div id="add" class="tab-content card">
            <h2>➕ 데이터 추가</h2>
            <div class="tabs" style="border: none;">
                <button class="tab-button active" onclick="switchAddTab('subject')">과목 추가</button>
                <button class="tab-button" onclick="switchAddTab('assessment')">수행평가 추가</button>
                <button class="tab-button" onclick="switchAddTab('feedback')">피드백 입력</button>
            </div>

            <!-- 과목 추가 폼 -->
            <div id="subject" class="tab-content active" style="margin-top: 20px;">
                <h3>새 과목 추가</h3>
                <div id="subjectAlert"></div>
                <form onsubmit="addSubject(event)">
                    <div class="form-group">
                        <label>과목명</label>
                        <input type="text" id="subjectName" required>
                    </div>
                    <div class="form-group">
                        <label>카테고리</label>
                        <select id="subjectCategory" required>
                            <option value="">선택하세요</option>
                            <option value="1">필수과목</option>
                            <option value="2">선택과목</option>
                            <option value="3">교양</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>학점</label>
                        <input type="number" id="creditHours" min="1" max="6" required>
                    </div>
                    <button type="submit" class="btn-primary">과목 추가</button>
                </form>
            </div>

            <!-- 수행평가 추가 폼 -->
            <div id="assessment" class="tab-content" style="margin-top: 20px;">
                <h3>새 수행평가 추가</h3>
                <div id="assessmentAlert"></div>
                <form onsubmit="addAssessment(event)">
                    <div class="form-group">
                        <label>과목</label>
                        <select id="assessmentSubject" required>
                            <option value="">과목 선택</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>평가 유형</label>
                        <select id="evaluationType" required>
                            <option value="">선택하세요</option>
                            <option value="1">개인 과제</option>
                            <option value="2">팀 프로젝트</option>
                            <option value="3">발표</option>
                            <option value="4">시험</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>반영비율 (%)</label>
                        <input type="number" id="weight" min="1" max="100" required>
                    </div>
                    <div class="form-group">
                        <label>마감일</label>
                        <input type="datetime-local" id="dueDate" required>
                    </div>
                    <div class="form-group">
                        <label>겹치는 과제 개수</label>
                        <input type="number" id="overlappingTasks" min="0" value="0">
                    </div>
                    <button type="submit" class="btn-primary">수행평가 추가</button>
                </form>
            </div>

            <!-- 피드백 입력 폼 -->
            <div id="feedback" class="tab-content" style="margin-top: 20px;">
                <h3>피드백 입력</h3>
                <div id="feedbackAlert"></div>
                <form onsubmit="addFeedback(event)">
                    <div class="form-group">
                        <label>수행평가</label>
                        <select id="feedbackAssessment" required>
                            <option value="">수행평가 선택</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>실제 소요 시간 (시간)</label>
                        <input type="number" id="timeSpent" min="0.5" step="0.5" required>
                    </div>
                    <div class="form-group">
                        <label>스트레스 점수 (1-10)</label>
                        <input type="number" id="stressScore" min="1" max="10" required>
                    </div>
                    <button type="submit" class="btn-primary">피드백 저장</button>
                </form>
            </div>
        </div>

        <div class="footer">
            <p>© 2024 수행평가 폭탄주의보 | 마감을 관리하고 스트레스를 줄이세요</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
            loadAssessments();
            loadSubjectsForForm();
        });

        // 탭 전환
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'priority') loadPriority();
            if (tabName === 'report') loadReport();
        }

        function switchAddTab(tabName) {
            document.querySelectorAll('#add .tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('#add .tab-button').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // 대시보드 로드
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/dashboard/summary`);
                const data = await response.json();
                const card = document.getElementById('dashboardCard');
                
                const statusClass = data.상태 === '위험' ? 'status-danger' : 
                                   data.상태 === '경고' ? 'status-warning' : 'status-normal';
                
                card.innerHTML = `
                    <div class="${statusClass}">
                        <div class="status-label">7일 내 마감 수행평가</div>
                        <div class="status-number">${data.마감임박_수행평가_개수}</div>
                        <div class="status-label" style="font-size: 1.1em; font-weight: 600;">${data.상태}</div>
                        <div class="status-message">${data.안내}</div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('dashboardCard').innerHTML = 
                    '<div class="alert alert-error">대시보드 로드 실패: ' + error.message + '</div>';
            }
        }

        // 수행평가 목록 로드
        async function loadAssessments() {
            try {
                const response = await fetch(`${API_BASE}/assessments`);
                const data = await response.json();
                const list = document.getElementById('assessmentList');

                if (data.length === 0) {
                    list.innerHTML = '<p style="color: #999; text-align: center;">등록된 수행평가가 없습니다.</p>';
                    return;
                }

                list.innerHTML = data.map(item => `
                    <div class="list-item">
                        <h3>
                            ${item.subject?.name || '과목 없음'}
                            <span class="priority-score">${formatDate(item.due_date)}</span>
                        </h3>
                        <div class="list-item-info">
                            <div><span>평가 유형:</span> <span>${getEvaluationType(item.evaluation_type)}</span></div>
                            <div><span>반영비율:</span> <span>${item.weight}%</span></div>
                            <div><span>겹치는 과제:</span> <span>${item.overlapping_tasks}개</span></div>
                            <div><span>스트레스:</span> <span>${item.user_stress_score ? item.user_stress_score + '/10' : '미입력'}</span></div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('assessmentList').innerHTML = 
                    '<div class="alert alert-error">로드 실패: ' + error.message + '</div>';
            }
        }

        // 우선순위 로드
        async function loadPriority() {
            try {
                const response = await fetch(`${API_BASE}/assessments/priority`);
                const data = await response.json();
                const list = document.getElementById('priorityList');

                if (data.length === 0) {
                    list.innerHTML = '<p style="color: #999; text-align: center;">등록된 수행평가가 없습니다.</p>';
                    return;
                }

                list.innerHTML = data.map((item, idx) => `
                    <div class="list-item">
                        <h3>
                            ${idx + 1}. ${item.과목명}
                            <span class="priority-score">점수: ${item.우선순위점수}</span>
                        </h3>
                        <div class="list-item-info">
                            <div><span>마감일:</span> <span>${formatDate(item.마감일)}</span></div>
                            <div><span>남은 일수:</span> <span>${item.남은일수}일</span></div>
                            <div><span>반영비율:</span> <span>${item.반영비율}%</span></div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('priorityList').innerHTML = 
                    '<div class="alert alert-error">로드 실패: ' + error.message + '</div>';
            }
        }

        // 리포트 로드
        // 리포트 로드
        async function loadReport() {
            const content = document.getElementById('reportContent');
            
            if (!content) {
                console.error('❌ reportContent 요소를 찾을 수 없습니다!');
                return;
            }

            content.innerHTML = '<div class="loading">📊 분석 데이터를 불러오는 중...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/analytics/user-report`);
                console.log('📡 API Response Status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('📊 Raw API Data:', JSON.stringify(data, null, 2));

                // 데이터 검증
                if (!data) {
                    throw new Error('응답 데이터가 비어있습니다.');
                }

                if (!Array.isArray(data.보고서)) {
                    throw new Error('보고서 데이터가 배열이 아닙니다.');
                }

                if (data.보고서.length === 0) {
                    content.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;"><p>📭 분석할 데이터가 없습니다.</p><p style="font-size: 0.9em;">seed.py를 실행하여 가상데이터를 생성하세요.</p></div>';
                    return;
                }

                const reportData = data.보고서;
                const overallStress = parseFloat(data.전체_평균_스트레스) || 0;
                
                console.log('✅ Processed Data:');
                console.log('   - reportData:', reportData);
                console.log('   - overallStress:', overallStress, 'type:', typeof overallStress);
                
                // 데이터 유효성 검사
                reportData.forEach((item, idx) => {
                    console.log(`Subject ${idx}: 평균_스트레스=${item.평균_스트레스}, 평가_개수=${item.평가_개수}, 평균_소요시간=${item.평균_소요시간}`);
                });
                
                // 전체 스트레스 상태 판단
                let stressStatus, statusColor;
                if (overallStress >= 8) {
                    stressStatus = '매우 높음 🔴';
                    statusColor = '#ff6b6b';
                } else if (overallStress >= 6) {
                    stressStatus = '높음 🟠';
                    statusColor = '#ffa500';
                } else if (overallStress >= 4) {
                    stressStatus = '보통 🟡';
                    statusColor = '#ffc107';
                } else {
                    stressStatus = '낮음 🟢';
                    statusColor = '#4caf50';
                }
                
                // 총 평가 개수 계산
                const totalAssessments = reportData.reduce((sum, s) => {
                    const count = parseInt(s.평가_개수) || 0;
                    return sum + count;
                }, 0);
                
                console.log('💯 totalAssessments:', totalAssessments);
                
                // 전체 요약 카드
                let html = `
                    <div style="margin-bottom: 30px;">
                        <h3 style="color: #333; margin-bottom: 15px;">📈 전체 통계</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                            <div style="background: ${statusColor}15; padding: 20px; border-radius: 8px; border-left: 4px solid ${statusColor};">
                                <div style="color: #666; font-size: 0.9em;">전체 평균 스트레스</div>
                                <div style="font-size: 2.5em; font-weight: bold; color: ${statusColor}; margin-top: 10px;">${parseFloat(overallStress).toFixed(1)}/10</div>
                                <div style="color: #666; font-size: 0.85em; margin-top: 5px;">${stressStatus}</div>
                            </div>
                            <div style="background: #e3f2fd; padding: 20px; border-radius: 8px; border-left: 4px solid #2196F3;">
                                <div style="color: #666; font-size: 0.9em;">분석 과목 수</div>
                                <div style="font-size: 2.5em; font-weight: bold; color: #2196F3; margin-top: 10px;">${reportData.length}개</div>
                            </div>
                            <div style="background: #fff3e0; padding: 20px; border-radius: 8px; border-left: 4px solid #ff9800;">
                                <div style="color: #666; font-size: 0.9em;">총 평가 개수</div>
                                <div style="font-size: 2.5em; font-weight: bold; color: #ff9800; margin-top: 10px;">${totalAssessments}개</div>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 30px;">
                        <h3 style="color: #333; margin-bottom: 15px;">📊 과목별 상세 분석</h3>
                        <div style="overflow-x: auto;">
                            <table style="width: 100%; border-collapse: collapse; background: white; border-radius: 8px;">
                                <thead>
                                    <tr style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                                        <th style="padding: 15px; text-align: left; font-weight: 600;">과목명</th>
                                        <th style="padding: 15px; text-align: center; font-weight: 600;">평균 스트레스</th>
                                        <th style="padding: 15px; text-align: center; font-weight: 600;">범위</th>
                                        <th style="padding: 15px; text-align: center; font-weight: 600;">평가 개수</th>
                                        <th style="padding: 15px; text-align: center; font-weight: 600;">평균 시간</th>
                                    </tr>
                                </thead>
                                <tbody>
                `;

                reportData.forEach((item, index) => {
                    const avgStress = parseFloat(item.평균_스트레스) || 0;
                    const maxStress = parseFloat(item.최고_스트레스) || 0;
                    const minStress = parseFloat(item.최저_스트레스) || 0;
                    const assessmentCount = parseInt(item.평가_개수) || 0;
                    const avgTime = parseFloat(item.평균_소요시간) || 0;
                    
                    const stressColor = avgStress >= 7 ? '#ff6b6b' : avgStress >= 5 ? '#ffa500' : '#4caf50';
                    const bgColor = index % 2 === 0 ? '#ffffff' : '#f8f9fa';
                    const timeEmoji = avgTime > 10 ? '⏰' : avgTime > 5 ? '⌛' : '✓';

                    html += `
                        <tr style="background: ${bgColor}; border-bottom: 1px solid #eee;">
                            <td style="padding: 15px; color: #333; font-weight: 500;">${item.과목명}</td>
                            <td style="padding: 15px; text-align: center;">
                                <div style="display: inline-block; background: ${stressColor}20; color: ${stressColor}; padding: 8px 14px; border-radius: 20px; font-weight: 600;">
                                    ${avgStress.toFixed(1)}/10
                                </div>
                            </td>
                            <td style="padding: 15px; text-align: center; color: #666; font-size: 0.9em;">
                                <span style="color: #ff6b6b; font-weight: 600;">↑${maxStress.toFixed(1)}</span> ~ 
                                <span style="color: #4caf50; font-weight: 600;">↓${minStress.toFixed(1)}</span>
                            </td>
                            <td style="padding: 15px; text-align: center; color: #333; font-weight: 500;">${assessmentCount}개</td>
                            <td style="padding: 15px; text-align: center; color: #333;">
                                <span style="font-weight: 500;">${avgTime.toFixed(1)}시간</span> <span style="opacity: 0.7;">${timeEmoji}</span>
                            </td>
                        </tr>
                    `;
                });

                html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;

                // 학습 조언
                html += generateAdvice(overallStress, reportData);

                content.innerHTML = html;
                console.log('✅ Report rendered successfully!');
                
            } catch (error) {
                console.error('❌ Report loading error:', error);
                const content = document.getElementById('reportContent');
                if (content) {
                    content.innerHTML = `
                        <div class="alert alert-error" style="padding: 20px;">
                            <h3 style="color: #c41e1e; margin-bottom: 10px;">❌ 분석 리포트 로드 실패</h3>
                            <p style="margin: 5px 0;"><strong>에러:</strong> ${error.message}</p>
                            <p style="margin: 10px 0; font-size: 0.9em; color: #666;">
                                <strong>해결 방법:</strong><br/>
                                1. 터미널에서 <code>python seed.py</code> 실행<br/>
                                2. <code>python main.py</code>로 서버 재시작<br/>
                                3. 페이지 새로고침 (Ctrl+R 또는 Cmd+R)
                            </p>
                        </div>
                    `;
                }
            }
        }

        // 학습 조언 생성 함수
        function generateAdvice(overallStress, reportData) {
            let adviceList = [];
            
            // 안전한 숫자 변환
            const safeOverallStress = parseFloat(overallStress) || 0;
            const safeReportData = reportData.filter(item => item && item.평균_스트레스 !== undefined);
            
            if (safeReportData.length === 0) {
                return `<div style="margin-top: 30px; background: #fff3e0; border-left: 4px solid #ff9800; padding: 25px; border-radius: 8px;">
                    <h3 style="color: #ff6b00; margin-bottom: 20px;">💡 스마트 학습 조언</h3>
                    <p style="color: #333;">분석할 데이터가 부족합니다.</p>
                </div>`;
            }

            // 1. 전체 스트레스 수준에 따른 조언
            if (safeOverallStress >= 8) {
                adviceList.push('🚨 <strong>긴급:</strong> 전체 스트레스가 매우 높습니다. 즉시 학습 계획을 재점검하고 충분한 휴식을 취하세요.');
            } else if (safeOverallStress >= 6) {
                adviceList.push('⚠️ <strong>경고:</strong> 전체적으로 스트레스가 높습니다. 과제 우선순위를 정리하고 효율적인 학습법을 시도해보세요.');
            } else if (safeOverallStress >= 4) {
                adviceList.push('ℹ️ <strong>정보:</strong> 현재 스트레스 수준이 적당합니다. 꾸준한 학습 관리로 현 상태를 유지하세요.');
            } else {
                adviceList.push('✅ <strong>좋음:</strong> 스트레스 수준이 낮습니다. 현재의 학습 방식을 계속 유지하세요.');
            }
            
            // 2. 높은 스트레스 과목 식별
            const highStressSubjects = safeReportData.filter(s => parseFloat(s.평균_스트레스) >= 7);
            if (highStressSubjects.length > 0) {
                const subjectNames = highStressSubjects.map(s => s.과목명).join(', ');
                adviceList.push(`🔴 <strong>${subjectNames}</strong> 과목의 스트레스가 높습니다. 이 과목들을 우선으로 집중 학습하세요.`);
            }
            
            // 3. 시간이 오래 걸리는 과목
            const longTimeSubjects = safeReportData.filter(s => parseFloat(s.평균_소요시간) > 10);
            if (longTimeSubjects.length > 0) {
                const subjectNames = longTimeSubjects.map(s => `${s.과목명}(${s.평균_소요시간}시간)`).join(', ');
                adviceList.push(`⏰ <strong>${subjectNames}</strong>은(는) 소요 시간이 많습니다. 효율적인 학습 방법을 연구하거나 더 많은 시간을 할당하세요.`);
            }
            
            // 4. 과목별 편차 분석
            if (safeReportData.length > 1) {
                const stressValues = safeReportData.map(s => parseFloat(s.평균_스트레스) || 0);
                const maxStress = Math.max(...stressValues);
                const minStress = Math.min(...stressValues);
                const avgStressRange = maxStress - minStress;
                
                if (avgStressRange > 5) {
                    adviceList.push(`📊 <strong>불균형:</strong> 과목 간 스트레스 편차가 큽니다. 어려운 과목에 더 많은 시간을 투자하세요.`);
                } else {
                    adviceList.push(`📊 <strong>균형:</strong> 과목 간 스트레스가 균등합니다. 현재의 균형잡힌 접근방식을 유지하세요.`);
                }
            }
            
            // 5. 최고/최저 스트레스 비교를 통한 조언
            const easySubjects = safeReportData.filter(s => parseFloat(s.평균_스트레스) < 3);
            if (easySubjects.length > 0 && highStressSubjects.length > 0) {
                adviceList.push(`💡 <strong>전략:</strong> ${easySubjects.map(s => s.과목명).join(', ')} 과목의 효율적인 학습법을 분석해서 어려운 과목에 적용해보세요.`);
            }
            
            // 6. 평가 개수 편차 조언
            if (safeReportData.length > 1) {
                const assessmentCounts = safeReportData.map(s => parseInt(s.평가_개수) || 0);
                const maxAssessments = Math.max(...assessmentCounts);
                const minAssessments = Math.min(...assessmentCounts);
                if (maxAssessments - minAssessments > 5) {
                    const busySubject = safeReportData.find(s => parseInt(s.평가_개수) === maxAssessments);
                    adviceList.push(`📋 <strong>활동량:</strong> ${busySubject.과목명} 과목에 평가가 많습니다. 시간 관리에 더욱 주의하세요.`);
                }
            }

            return `
                <div style="margin-top: 30px; background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); border-left: 4px solid #ff9800; padding: 25px; border-radius: 8px;">
                    <h3 style="color: #ff6b00; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 1.5em;">💡</span> 스마트 학습 조언
                    </h3>
                    <ul style="margin: 0; padding-left: 20px; color: #333; line-height: 2;">
                        ${adviceList.map(advice => `<li style="margin-bottom: 12px;">${advice}</li>`).join('')}
                    </ul>
                </div>
            `;
        }

        // 과목 목록 로드 (폼용)
        async function loadSubjectsForForm() {
            try {
                const response = await fetch(`${API_BASE}/subjects`);
                const subjects = await response.json();
                
                const selects = [
                    document.getElementById('assessmentSubject'),
                    document.getElementById('feedbackAssessment')
                ];

                selects.forEach(select => {
                    const currentValue = select.value;
                    select.innerHTML = '<option value="">선택하세요</option>' +
                        subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                    select.value = currentValue;
                });
            } catch (error) {
                console.error('과목 로드 실패:', error);
            }
        }

        // 과목 추가
        async function addSubject(event) {
            event.preventDefault();
            const alert = document.getElementById('subjectAlert');

            try {
                const response = await fetch(`${API_BASE}/subjects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('subjectName').value,
                        category: parseInt(document.getElementById('subjectCategory').value),
                        credit_hours: parseInt(document.getElementById('creditHours').value)
                    })
                });

                if (response.ok) {
                    alert.innerHTML = '<div class="alert alert-success">✓ 과목이 추가되었습니다!</div>';
                    event.target.reset();
                    loadSubjectsForForm();
                    setTimeout(() => alert.innerHTML = '', 3000);
                } else {
                    const error = await response.json();
                    alert.innerHTML = '<div class="alert alert-error">✗ 오류: ' + (error.detail || '추가 실패') + '</div>';
                }
            } catch (error) {
                alert.innerHTML = '<div class="alert alert-error">✗ 오류: ' + error.message + '</div>';
            }
        }

        // 수행평가 추가
        async function addAssessment(event) {
            event.preventDefault();
            const alert = document.getElementById('assessmentAlert');

            try {
                const response = await fetch(`${API_BASE}/assessments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subject_id: parseInt(document.getElementById('assessmentSubject').value),
                        evaluation_type: parseInt(document.getElementById('evaluationType').value),
                        weight: parseInt(document.getElementById('weight').value),
                        due_date: document.getElementById('dueDate').value + ':00',
                        overlapping_tasks: parseInt(document.getElementById('overlappingTasks').value)
                    })
                });

                if (response.ok) {
                    alert.innerHTML = '<div class="alert alert-success">✓ 수행평가가 추가되었습니다!</div>';
                    event.target.reset();
                    loadAssessments();
                    loadDashboard();
                    setTimeout(() => alert.innerHTML = '', 3000);
                } else {
                    const error = await response.json();
                    alert.innerHTML = '<div class="alert alert-error">✗ 오류: ' + (error.detail || '추가 실패') + '</div>';
                }
            } catch (error) {
                alert.innerHTML = '<div class="alert alert-error">✗ 오류: ' + error.message + '</div>';
            }
        }

        // 피드백 추가
        async function addFeedback(event) {
            event.preventDefault();
            const alert = document.getElementById('feedbackAlert');
            const assessmentId = document.getElementById('feedbackAssessment').value;

            try {
                const response = await fetch(`${API_BASE}/assessments/${assessmentId}/feedback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        actual_time_spent: parseFloat(document.getElementById('timeSpent').value),
                        user_stress_score: parseFloat(document.getElementById('stressScore').value)
                    })
                });

                if (response.ok) {
                    alert.innerHTML = '<div class="alert alert-success">✓ 피드백이 저장되었습니다!</div>';
                    event.target.reset();
                    loadAssessments();
                    loadReport();
                    setTimeout(() => alert.innerHTML = '', 3000);
                } else {
                    const error = await response.json();
                    alert.innerHTML = '<div class="alert alert-error">✗ 오류: ' + (error.detail || '저장 실패') + '</div>';
                }
            } catch (error) {
                alert.innerHTML = '<div class="alert alert-error">✗ 오류: ' + error.message + '</div>';
            }
        }

        // 유틸리티 함수
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
        }

        function getEvaluationType(type) {
            const types = { 1: '개인 과제', 2: '팀 프로젝트', 3: '발표', 4: '시험' };
            return types[type] || '기타';
        }
    </script>
</body>
